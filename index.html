<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crystal Palace</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h1 {
    font-size: 1.5em;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #a855f7, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.85em;
    color: #666;
    margin-bottom: 30px;
  }

  .crystal-preview {
    width: 120px;
    height: 160px;
    margin: 20px auto;
    position: relative;
  }

  .crystal-shape {
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 0%, 85% 35%, 75% 100%, 25% 100%, 15% 35%);
    background: radial-gradient(ellipse at 50% 60%, var(--glow-color, #8000ff), transparent 70%),
                linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.3s;
  }

  .status {
    text-align: center;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.9em;
    margin-bottom: 20px;
  }

  .status.disconnected { background: #1a1a2e; color: #888; }
  .status.connecting { background: #1a1a2e; color: #a855f7; }
  .status.connected { background: #0f2a1f; color: #4ade80; }
  .status.error { background: #2a1a1a; color: #f87171; }

  .connect-btn {
    background: linear-gradient(135deg, #a855f7, #6366f1);
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 30px;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 30px;
    transition: opacity 0.2s;
    width: 100%;
    max-width: 300px;
  }

  .connect-btn:active { opacity: 0.8; }
  .connect-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .config-panel {
    width: 100%;
    max-width: 340px;
    display: none;
  }

  .config-panel.visible { display: block; }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 0.8em;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="color"] {
    width: 60px;
    height: 60px;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 4px;
    background: #1a1a2e;
    cursor: pointer;
  }

  .color-hex {
    font-family: monospace;
    font-size: 1.2em;
    color: #ccc;
  }

  .presets {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .preset {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #333;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .preset:active { border-color: white; }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    background: #1a1a2e;
    border: 2px solid #333;
    border-radius: 10px;
    color: white;
    font-size: 1em;
    outline: none;
  }

  input[type="text"]:focus { border-color: #a855f7; }

  input[type="range"] {
    width: 100%;
    accent-color: #a855f7;
  }

  .brightness-value {
    text-align: right;
    font-family: monospace;
    color: #888;
    font-size: 0.85em;
  }

  .save-btn {
    background: #1a2a1f;
    color: #4ade80;
    border: 2px solid #2a4a2f;
    padding: 14px;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 10px;
    transition: background 0.2s;
  }

  .save-btn:active { background: #2a4a2f; }
  .save-btn:disabled { opacity: 0.4; }

  .saved-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a4a2f;
    color: #4ade80;
    padding: 12px 24px;
    border-radius: 20px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .saved-toast.show { opacity: 1; }

  .instructions {
    margin-top: 30px;
    padding: 16px;
    background: #111;
    border-radius: 12px;
    font-size: 0.8em;
    color: #666;
    line-height: 1.6;
    max-width: 340px;
  }

  .instructions strong { color: #999; }
</style>
</head>
<body>

<h1>Crystal Palace</h1>
<p class="subtitle">Crystal Configuration</p>

<div class="crystal-preview">
  <div class="crystal-shape" id="crystalPreview"></div>
</div>

<div class="status disconnected" id="status">Not connected</div>

<button class="connect-btn" id="connectBtn" onclick="connectCrystal()">
  Connect to Crystal
</button>

<button class="connect-btn" id="demoBtn" onclick="enterDemo()" style="background: #333; margin-top: -15px; font-size: 0.85em; padding: 10px 30px;">
  Demo Mode
</button>

<div class="config-panel" id="configPanel">

  <div class="field">
    <label>Crystal Color</label>
    <div class="color-picker-wrap">
      <input type="color" id="colorPicker" value="#8000ff" onchange="onColorChange()">
      <span class="color-hex" id="colorHex">#8000FF</span>
    </div>
    <div class="presets">
      <div class="preset" style="background:#8000ff" onclick="setColor('#8000ff')"></div>
      <div class="preset" style="background:#ff0080" onclick="setColor('#ff0080')"></div>
      <div class="preset" style="background:#00ffff" onclick="setColor('#00ffff')"></div>
      <div class="preset" style="background:#ff4400" onclick="setColor('#ff4400')"></div>
      <div class="preset" style="background:#00ff44" onclick="setColor('#00ff44')"></div>
      <div class="preset" style="background:#ffff00" onclick="setColor('#ffff00')"></div>
      <div class="preset" style="background:#ffffff" onclick="setColor('#ffffff')"></div>
    </div>
  </div>

  <div class="field">
    <label>Crystal Name</label>
    <input type="text" id="nameInput" maxlength="8" placeholder="e.g. DAVE">
  </div>

  <div class="field">
    <label>Brightness</label>
    <input type="range" id="brightnessSlider" min="5" max="76" value="76" oninput="onBrightnessChange()">
    <div class="brightness-value" id="brightnessValue">76 / 76</div>
  </div>

  <button class="save-btn" id="saveBtn" onclick="saveConfig()">
    Save to Crystal
  </button>
</div>

<div class="instructions" id="instructions">
  <strong>How to configure:</strong><br>
  1. Remove battery from crystal, reinsert<br>
  2. Crystal LED pulses white = config mode<br>
  3. Tap "Connect to Crystal" above<br>
  4. Pick your color and name<br>
  5. Tap "Save" — crystal remembers your settings
</div>

<div class="saved-toast" id="toast">Saved to crystal!</div>

<script>
// Crystal Palace BLE UUIDs
// Base UUID: 43525953-5441-4C50-414C-414345210000
const SERVICE_UUID    = '43525953-5441-4c50-414c-414345210001';
const COLOR_UUID      = '43525953-5441-4c50-414c-414345210002';
const NAME_UUID       = '43525953-5441-4c50-414c-414345210003';
const BRIGHTNESS_UUID = '43525953-5441-4c50-414c-414345210004';
const DEVICE_ID_UUID  = '43525953-5441-4c50-414c-414345210005';

let device = null;
let server = null;
let service = null;
let colorChar = null;
let nameChar = null;
let brightnessChar = null;
let idChar = null;

let demoMode = false;

// Simulated crystal state for demo mode
let demoState = {
  color: [0x80, 0x00, 0xFF],
  name: 'CRYSTAL',
  brightness: 76,
  id: 1
};

// ---- Demo Mode ----

function enterDemo() {
  demoMode = true;
  setStatus('connected', 'Demo Mode — CP-CRYSTAL');
  document.getElementById('configPanel').classList.add('visible');
  document.getElementById('demoBtn').style.display = 'none';

  const btn = document.getElementById('connectBtn');
  btn.textContent = 'Exit Demo';
  btn.onclick = exitDemo;

  // Load demo values into UI
  const hex = '#' + demoState.color.map(v => v.toString(16).padStart(2, '0')).join('');
  document.getElementById('colorPicker').value = hex;
  document.getElementById('nameInput').value = demoState.name;
  document.getElementById('brightnessSlider').value = demoState.brightness;
  onColorChange();
  onBrightnessChange();
}

function exitDemo() {
  demoMode = false;
  setStatus('disconnected', 'Not connected');
  document.getElementById('configPanel').classList.remove('visible');
  document.getElementById('demoBtn').style.display = '';

  const btn = document.getElementById('connectBtn');
  btn.textContent = 'Connect to Crystal';
  btn.onclick = connectCrystal;
}

// ---- Connect ----

async function connectCrystal() {
  const btn = document.getElementById('connectBtn');
  const status = document.getElementById('status');

  try {
    setStatus('connecting', 'Searching...');
    btn.disabled = true;

    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'CP-' }],
      optionalServices: [SERVICE_UUID]
    });

    device.addEventListener('gattserverdisconnected', onDisconnect);

    setStatus('connecting', 'Connecting...');
    server = await device.gatt.connect();

    setStatus('connecting', 'Finding service...');
    service = await server.getPrimaryService(SERVICE_UUID);

    // Get characteristics
    colorChar      = await service.getCharacteristic(COLOR_UUID);
    nameChar       = await service.getCharacteristic(NAME_UUID);
    brightnessChar = await service.getCharacteristic(BRIGHTNESS_UUID);

    try {
      idChar = await service.getCharacteristic(DEVICE_ID_UUID);
    } catch (e) {
      idChar = null; // Optional
    }

    // Read current values
    await readCurrentConfig();

    setStatus('connected', 'Connected to ' + device.name);
    document.getElementById('configPanel').classList.add('visible');
    btn.textContent = 'Disconnect';
    btn.disabled = false;
    btn.onclick = disconnectCrystal;

  } catch (err) {
    if (err.name === 'NotFoundError') {
      setStatus('disconnected', 'No crystal found. Is it in config mode?');
    } else {
      setStatus('error', err.message);
    }
    btn.disabled = false;
  }
}

function disconnectCrystal() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
  onDisconnect();
}

function onDisconnect() {
  setStatus('disconnected', 'Disconnected');
  document.getElementById('configPanel').classList.remove('visible');
  const btn = document.getElementById('connectBtn');
  btn.textContent = 'Connect to Crystal';
  btn.onclick = connectCrystal;
  btn.disabled = false;
  device = null;
  server = null;
  service = null;
}

// ---- Read current config ----

async function readCurrentConfig() {
  try {
    // Read color
    const colorVal = await colorChar.readValue();
    const r = colorVal.getUint8(0);
    const g = colorVal.getUint8(1);
    const b = colorVal.getUint8(2);
    const hex = '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    document.getElementById('colorPicker').value = hex;
    onColorChange();

    // Read name
    const nameVal = await nameChar.readValue();
    const decoder = new TextDecoder();
    document.getElementById('nameInput').value = decoder.decode(nameVal.buffer);

    // Read brightness
    const brightVal = await brightnessChar.readValue();
    document.getElementById('brightnessSlider').value = brightVal.getUint8(0);
    onBrightnessChange();

  } catch (e) {
    console.log('Could not read config:', e);
  }
}

// ---- Save config ----

async function saveConfig() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;

  const hex = document.getElementById('colorPicker').value;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const name = document.getElementById('nameInput').value.slice(0, 8);
  const brightness = parseInt(document.getElementById('brightnessSlider').value);

  if (demoMode) {
    // Demo mode — just save locally
    demoState.color = [r, g, b];
    demoState.name = name;
    demoState.brightness = brightness;
    showToast('Saved! (demo mode)');
    btn.disabled = false;
    return;
  }

  try {
    await colorChar.writeValue(new Uint8Array([r, g, b]));

    const encoder = new TextEncoder();
    await nameChar.writeValue(encoder.encode(name));

    await brightnessChar.writeValue(new Uint8Array([brightness]));

    showToast('Saved to crystal!');

  } catch (err) {
    showToast('Error: ' + err.message);
  }

  btn.disabled = false;
}

// ---- UI helpers ----

function setStatus(cls, text) {
  const el = document.getElementById('status');
  el.className = 'status ' + cls;
  el.textContent = text;
}

function setColor(hex) {
  document.getElementById('colorPicker').value = hex;
  onColorChange();
}

function onColorChange() {
  const hex = document.getElementById('colorPicker').value;
  document.getElementById('colorHex').textContent = hex.toUpperCase();
  document.getElementById('crystalPreview').style.setProperty('--glow-color', hex);
}

function onBrightnessChange() {
  const val = document.getElementById('brightnessSlider').value;
  document.getElementById('brightnessValue').textContent = val + ' / 76';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// Init
onColorChange();
</script>

</body>
</html>
